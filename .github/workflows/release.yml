name: Release

# 首次使用请在仓库 Settings → Actions → General 中启用 Actions
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            view/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS)
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: node scripts/ci-npm-install.mjs

      - name: Build frontend (static export)
        run: npm run build:static --prefix view

      # minisign 私钥须为完整多行文本（首行 untrusted comment: minisign private key: ...）
      # 生成：CI=true npx tauri signer generate -w clide-updater.key
      # 将 clide-updater.key 全文粘贴到 Secrets → TAURI_SIGNING_PRIVATE_KEY
      # 无密码时不要配置 TAURI_SIGNING_PRIVATE_KEY_PASSWORD
      - name: Prepare updater signing key
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/prepare-tauri-signing-ci.mjs

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: clide ${{ github.ref_name }}
          releaseBody: |
            ## Clide v0.1.76

            下载对应平台的安装包即可使用。首次使用请确保本机已安装 [Claude Code CLI](https://docs.anthropic.com/en/docs/claude-code) 并完成登录。

            ### 本版更新
            - **布局快照**：保存前探测各 shell 真实工作目录；加载时自动连接服务器并恢复布局
            - **AI 启动**：若上次对话非空，启动时自动新建空对话线程
            - **多机同步输入**：选择多台服务器一键开 tab，终端按键/粘贴同步广播到全部 shell
            - **同步组布局**：创建同步组时自动平铺各 shell 窗口
            - **面板记忆**：服务器列表、文件树、AI 面板折叠/展开状态跨重启保留
            - **Windows 免安装版**：新增 `*-portable.zip`，解压后双击 `clide.exe` 即可运行

            ### 平台说明
            - **Windows**: `.exe` 安装包 / `*-portable.zip` 免安装版（支持应用内更新）
            - **macOS**: `.dmg`（含 Apple Silicon 与 Intel 两个构建）
            - **Linux**: `.deb` / `.AppImage`
          releaseDraft: false
          prerelease: false
          projectPath: src-tauri
          args: ${{ matrix.args }}

      - name: Package Windows portable zip
        if: matrix.platform == 'windows-latest'
        run: node scripts/package-windows-portable.mjs

      - name: Upload Windows portable zip
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "src-tauri/target/release/bundle/Clide_*_x64-portable.zip" --clobber
