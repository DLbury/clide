name: Release

# 首次使用请在仓库 Settings → Actions → General 中启用 Actions
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            view/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS)
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: node scripts/ci-npm-install.mjs

      - name: Build frontend (static export)
        run: npm run build:static --prefix view

      # minisign 私钥须为完整多行文本（首行 untrusted comment: minisign private key: ...）
      # 生成：CI=true npx tauri signer generate -w clide-updater.key
      # 将 clide-updater.key 全文粘贴到 Secrets → TAURI_SIGNING_PRIVATE_KEY
      # 无密码时不要配置 TAURI_SIGNING_PRIVATE_KEY_PASSWORD
      - name: Prepare updater signing key
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/prepare-tauri-signing-ci.mjs

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: clide ${{ github.ref_name }}
          releaseBody: |
            ## Clide v0.1.79

            下载对应平台的安装包即可使用。首次使用请确保本机已安装 [Claude Code CLI](https://docs.anthropic.com/en/docs/claude-code) 并完成登录。

            ### 本版更新
            - **修复**：左侧服务器连接状态与真实终端不同步（多 Shell 聚合状态）
            - **修复**：Windows SSH 主机保存布局时无法记录 Shell 路径
            - **增强**：服务器监控面板（负载/运行时间/Swap/进度条、磁盘与网络分项曲线）
            - **增强**：进程/端口表格列宽可拖拽调整并记忆

            ### 平台说明
            - **Windows**: `.exe` 安装包 / `*-portable.zip` 免安装版（支持应用内更新）
            - **macOS**: `.dmg`（含 Apple Silicon 与 Intel 两个构建）
            - **Linux**: `.deb` / `.AppImage`
          releaseDraft: false
          prerelease: false
          projectPath: src-tauri
          args: ${{ matrix.args }}

      - name: Package Windows portable zip
        if: matrix.platform == 'windows-latest'
        run: node scripts/package-windows-portable.mjs

      - name: Upload Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = Get-ChildItem -Path "src-tauri/target/release/bundle" -Filter "Clide_*_x64-portable.zip" | Select-Object -First 1
          if (-not $zip) { throw "Portable zip not found under src-tauri/target/release/bundle" }
          gh release upload "${{ github.ref_name }}" $zip.FullName --clobber
